<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEAM HSEC | Acceso Administrativo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body {
      background: radial-gradient(circle at center, #2a080c 0%, #111318 100%);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      width: 100%;
      max-width: 440px;
      animation: fadeInUp 0.6s ease-out;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(215, 163, 7, 0.25);
      border-radius: var(--radius);
      padding: 40px 30px;
      box-shadow: 0 24px 50px rgba(0, 0, 0, 0.5);
      text-align: center;
    }
    .logo-container {
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .logo-container img {
      width: 130px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    }
    .logo-container h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      color: #ffffff;
      margin: 0;
      letter-spacing: 0.5px;
    }
    .logo-container h1 span {
      color: var(--gold);
    }
    .subtitle {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
      position: relative;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gold);
      margin-bottom: 8px;
      font-weight: 600;
    }
    .input-wrapper {
      position: relative;
    }
    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.4);
      font-size: 16px;
      transition: color 0.3s ease;
    }
    .form-control {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      padding: 14px 20px 14px 45px;
      color: #ffffff;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s ease, background 0.3s ease;
    }
    .form-control:focus {
      border-color: var(--gold);
      background: rgba(255, 255, 255, 0.08);
    }
    .form-control:focus + i {
      color: var(--gold);
    }
    .login-btn {
      width: 100%;
      margin-top: 10px;
      background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
      border: none;
      padding: 14px;
      font-size: 15px;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 15px rgba(179, 0, 10, 0.4);
    }
    .login-btn:hover {
      background: linear-gradient(135deg, var(--red-dark) 0%, #b3000a 100%);
      box-shadow: 0 6px 20px rgba(179, 0, 10, 0.6);
      transform: translateY(-2px);
    }
    .login-btn:active {
      transform: translateY(0);
    }
    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 24px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      transition: color 0.3s ease;
    }
    .back-home:hover {
      color: var(--gold);
    }
    .alert {
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
      justify-content: center;
      animation: shake 0.5s ease-in-out;
    }
    .alert-danger {
      background: rgba(219, 58, 52, 0.15);
      border: 1px solid rgba(219, 58, 52, 0.3);
      color: #ff8885;
    }
    .alert-success {
      background: rgba(46, 196, 182, 0.15);
      border: 1px solid rgba(46, 196, 182, 0.3);
      color: #7bf1a8;
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <div class="logo-container">
        <img src="/public/img/logo_teamhsec.webp" alt="TEAM HSEC" onerror="this.src='/img/logo_teamhsec.webp'">
        <h1>TEAM <span>HSEC</span></h1>
      </div>
      <p class="subtitle">Panel de Control de Certificados</p>

      <div class="alert alert-danger" id="login-alert">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="alert-msg">Error de credenciales</span>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <div class="input-wrapper">
            <input type="email" id="email" class="form-control" placeholder="correo@ejemplo.com" required autocomplete="username">
            <i class="fa-regular fa-envelope"></i>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            <i class="fa-solid fa-lock"></i>
          </div>
        </div>

        <button type="submit" class="button primary login-btn" id="submit-btn">
          <span id="btn-text">Iniciar Sesión</span>
          <div class="spinner" id="btn-spinner"></div>
        </button>
      </form>

      <a href="/" class="back-home">
        <i class="fa-solid fa-arrow-left"></i> Volver a la página principal
      </a>
    </div>
  </div>

  <script>
    // Login behavior
    const form = document.getElementById('login-form');
    const alertBox = document.getElementById('login-alert');
    const alertMsg = document.getElementById('alert-msg');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const btnSpinner = document.getElementById('btn-spinner');

    // Check if already logged in
    if (localStorage.getItem('admin_token')) {
      window.location.href = '/admin/dashboard.html';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Reset UI
      alertBox.style.display = 'none';
      submitBtn.disabled = true;
      btnText.style.display = 'none';
      btnSpinner.style.display = 'inline-block';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok && data.token) {
          localStorage.setItem('admin_token', data.token);
          localStorage.setItem('admin_user', JSON.stringify(data.usuario || { email }));
          
          alertBox.className = 'alert alert-success';
          alertBox.innerHTML = '<i class="fa-solid fa-circle-check"></i> Acceso autorizado. Redirigiendo...';
          alertBox.style.display = 'flex';

          setTimeout(() => {
            window.location.href = '/admin/dashboard.html';
          }, 1000);
        } else {
          throw new Error(data.message || 'Credenciales incorrectas');
        }
      } catch (err) {
        alertMsg.textContent = err.message;
        alertBox.className = 'alert alert-danger';
        alertBox.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> ${err.message}`;
        alertBox.style.display = 'flex';
        
        submitBtn.disabled = false;
        btnText.style.display = 'inline';
        btnSpinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
